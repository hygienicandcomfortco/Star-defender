<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <meta name="theme-color" content="#020617" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Star Defender" />
    <link rel="icon" type="image/svg+xml" href="./assets/branding/logo-mark.svg" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <title>Neon Drift</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100vw;
        height: 100dvh;
        min-height: 100dvh;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        background: radial-gradient(circle at center, #111827 0%, #020617 80%);
      }

      #app {
        position: fixed;
        inset: 0;
        width: 100vw;
        height: 100dvh;
        overflow: hidden;
      }

      canvas {
        display: block;
        margin: 0 auto;
        width: 100% !important;
        height: 100% !important;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
